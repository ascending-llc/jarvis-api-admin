name: Build & Push to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'server.ts'
      - 'package.json'
      - 'bun.lock'
      - 'Dockerfile'
      - '.github/workflows/build.yaml'

permissions:
  id-token: write
  contents: read

run-name: Build Admin Panel @ ${{ github.sha }}

jobs:
  test:
    name: Lint, Type Check & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bunx eslint src/ --max-warnings 0

      - name: TypeScript
        run: bunx tsc --noEmit

      - name: Vitest
        run: bun run test
        env:
          NODE_ENV: development
          SESSION_SECRET: ci-test-secret-do-not-use-in-production

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Assume IAM role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SAAS_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: deployment-role-session
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "897729109735"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/jarvis/admin-panel:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/jarvis/admin-panel:latest
          provenance: false
